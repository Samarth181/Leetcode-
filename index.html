<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate DSA Tracker</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: 'Inter', system-ui, sans-serif; }
    button { transition: all 0.2s; }
    button:hover { filter: brightness(1.2); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ─── UTILITY: Normalize problem names for global syncing ─────────────
    // "Two Sum" -> "twosum", "Pow(x, n)" -> "powxn"
    const normalize = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');

    // ─── SHEET 1: STRICT BLIND 75 ─────────────────────────────────────────
    const BLIND_75 = {
      "Arrays & Hashing": { emoji: "📊", items: [
        ["Two Sum","E"],["Contains Duplicate","E"],["Valid Anagram","E"],["Group Anagrams","M"],
        ["Top K Frequent Elements","M"],["Product of Array Except Self","M"],["Encode and Decode Strings","M"],
        ["Longest Consecutive Sequence","M"]
      ]},
      "Two Pointers": { emoji: "🪟", items: [
        ["Valid Palindrome","E"],["3Sum","M"],["Container With Most Water","M"]
      ]},
      "Sliding Window": { emoji: "📦", items: [
        ["Best Time to Buy and Sell Stock","E"],["Longest Substring Without Repeating Characters","M"],
        ["Longest Repeating Character Replacement","M"],["Minimum Window Substring","H"]
      ]},
      "Stack": { emoji: "📚", items: [
        ["Valid Parentheses","E"]
      ]},
      "Binary Search": { emoji: "🔍", items: [
        ["Find Minimum in Rotated Sorted Array","M"],["Search in Rotated Sorted Array","M"]
      ]},
      "Linked List": { emoji: "🔗", items: [
        ["Reverse Linked List","E"],["Merge Two Sorted Lists","E"],["Reorder List","M"],
        ["Remove Nth Node From End of List","M"],["Linked List Cycle","E"],["Merge K Sorted Lists","H"]
      ]},
      "Trees": { emoji: "🌳", items: [
        ["Invert Binary Tree","E"],["Maximum Depth of Binary Tree","E"],["Same Tree","E"],
        ["Subtree of Another Tree","E"],["Lowest Common Ancestor of a BST","M"],
        ["Binary Tree Level Order Traversal","M"],["Validate Binary Search Tree","M"],
        ["Kth Smallest Element in a BST","M"],["Construct Binary Tree from Preorder and Inorder Traversal","M"],
        ["Binary Tree Maximum Path Sum","H"],["Serialize and Deserialize Binary Tree","H"]
      ]},
      "Tries": { emoji: "🌐", items: [
        ["Implement Trie (Prefix Tree)","M"],["Design Add and Search Words Data Structure","M"],["Word Search II","H"]
      ]},
      "Backtracking": { emoji: "🔄", items: [
        ["Combination Sum","M"],["Word Search","M"]
      ]},
      "Graphs": { emoji: "🕸️", items: [
        ["Number of Islands","M"],["Clone Graph","M"],["Pacific Atlantic Water Flow","M"],
        ["Course Schedule","M"],["Number of Connected Components in an Undirected Graph","M"],
        ["Graph Valid Tree","M"],["Alien Dictionary","H"]
      ]},
      "1D Dynamic Programming": { emoji: "🧩", items: [
        ["Climbing Stairs","E"],["House Robber","M"],["House Robber II","M"],
        ["Longest Palindromic Substring","M"],["Palindromic Substrings","M"],
        ["Decode Ways","M"],["Coin Change","M"],["Maximum Product Subarray","M"],
        ["Word Break","M"],["Longest Increasing Subsequence","M"]
      ]},
      "2D Dynamic Programming": { emoji: "🎲", items: [
        ["Unique Paths","M"],["Longest Common Subsequence","M"]
      ]},
      "Greedy": { emoji: "💰", items: [
        ["Maximum Subarray","M"],["Jump Game","M"]
      ]},
      "Intervals": { emoji: "⏱️", items: [
        ["Insert Interval","M"],["Merge Intervals","M"],["Non-overlapping Intervals","M"],["Meeting Rooms","E"],["Meeting Rooms II","M"]
      ]},
      "Math & Geometry": { emoji: "📐", items: [
        ["Rotate Image","M"],["Spiral Matrix","M"],["Set Matrix Zeroes","M"]
      ]},
      "Bit Manipulation": { emoji: "⚙️", items: [
        ["Number of 1 Bits","E"],["Counting Bits","E"],["Reverse Bits","E"],
        ["Missing Number","E"],["Sum of Two Integers","M"]
      ]}
    };

    // ─── SHEET 2: TOP 150 CURATED (Product Companies) ──────────────────────
    const CURATED_150 = {
      "Arrays": { emoji: "📊", items: [
        ["Move Zeros to End","E"],["Remove Duplicates from Sorted Array","E"],["Find Missing Number","E"],
        ["Two Sum","M"],["Kadane's Algorithm (Max Subarray Sum)","M"],["Majority Element I","M"],
        ["Next Permutation","M"],["3Sum","M"],["Rotate Image","M"],["Maximum Product Subarray","H"]
      ]},
      "Hashing": { emoji: "#️⃣", items: [
        ["Longest Consecutive Sequence","M"],["Count Subarrays with Given Sum","M"]
      ]},
      "Binary Search": { emoji: "🔍", items: [
        ["Search Insert Position","E"],["Search in Rotated Sorted Array","M"],
        ["Find Minimum in Rotated Sorted Array","M"],["Koko Eating Bananas","M"],
        ["Aggressive Cows","H"],["Median of Two Sorted Arrays","H"]
      ]},
      "Trees": { emoji: "🌳", items: [
        ["Maximum Depth of Binary Tree","E"],["Diameter of Binary Tree","E"],
        ["Lowest Common Ancestor of a BST","M"],["Binary Tree Maximum Path Sum","H"]
      ]},
      "Dynamic Programming": { emoji: "🧩", items: [
        ["Climbing Stairs","E"],["House Robber","M"],["0/1 Knapsack","M"],
        ["Longest Common Subsequence","M"],["Edit Distance","H"]
      ]}
      // Add the rest of your 150 array here following the ["Name", "Difficulty"] format
    };

    // ─── SHEET 3: MASTER 223 ─────────────────────────────────────────────
    const MASTER_223 = {
      "Arrays Master": { emoji: "📊", items: [
        ["Two Sum","E"],["Best Time to Buy and Sell Stock","E"],["Move Zeros to End","E"],
        ["Next Permutation","M"],["Rotate Image","M"],["Spiral Matrix","M"],["Trapping Rain Water","H"]
      ]},
      "Binary Search Master": { emoji: "🔍", items: [
        ["Binary Search","E"],["Search in Rotated Sorted Array","M"],["Koko Eating Bananas","M"],
        ["Split Array Largest Sum","H"],["Median of Two Sorted Arrays","H"]
      ]}
      // Add the rest of your 223 array here
    };

    const DIFF_COLORS = {
      E: { label:"Easy", c:"#3fb950", bg:"rgba(63,185,80,0.1)", br:"rgba(63,185,80,0.3)" },
      M: { label:"Medium", c:"#d29922", bg:"rgba(210,153,34,0.1)", br:"rgba(210,153,34,0.3)" },
      H: { label:"Hard", c:"#f85149", bg:"rgba(248,81,73,0.1)", br:"rgba(248,81,73,0.3)" },
    };

    function App() {
      const [tab, setTab] = useState(0);
      const [done, setDone] = useState(() => {
        const saved = localStorage.getItem('dsa_sync_progress');
        return saved ? JSON.parse(saved) : {};
      });
      const [q, setQ] = useState("");
      const [df, setDf] = useState("all");
      const [exp, setExp] = useState({});

      // Dynamic data selection based on active tab
      const data = tab === 0 ? BLIND_75 : tab === 1 ? CURATED_150 : MASTER_223;

      // ─── THE SYNC MAGIC: Toggle by Normalized Name ───
      const toggle = (name) => {
        const key = normalize(name);
        const newDone = { ...done, [key]: !done[key] };
        setDone(newDone);
        localStorage.setItem('dsa_sync_progress', JSON.stringify(newDone));
      };

      // Calculate stats for the CURRENT active tab
      const stats = useMemo(() => {
        let total=0, solved=0, es=0, ms=0, hs=0;
        Object.values(data).forEach(({items}) => {
          items.forEach(([name, diff]) => {
            total++;
            if (done[normalize(name)]) {
              solved++;
              if (diff === "E") es++;
              if (diff === "M") ms++;
              if (diff === "H") hs++;
            }
          });
        });
        return { total, solved, es, ms, hs };
      }, [data, done]);

      // Filter logic
      const fdata = useMemo(() => {
        const dm = { easy: "E", medium: "M", hard: "H" };
        const res = {};
        Object.entries(data).forEach(([topic, { emoji, items }]) => {
          const filtered = items.filter(([name, diff]) => {
            if (q && !name.toLowerCase().includes(q.toLowerCase())) return false;
            if (df !== "all" && diff !== dm[df]) return false;
            return true;
          });
          if (filtered.length > 0) res[topic] = { emoji, items: filtered };
        });
        return res;
      }, [data, q, df]);

      const pct = stats.total > 0 ? Math.round((stats.solved / stats.total) * 100) : 0;
      const getTopicSolvedCount = (topic) => data[topic].items.filter(([n]) => done[normalize(n)]).length;

      return (
        <div>
          {/* HEADER */}
          <div style={{ background: "#161b22", borderBottom: "1px solid #30363d", padding: "18px 20px 0" }}>
            <div style={{ maxWidth: 860, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <span style={{ fontSize: 24 }}>⚡</span>
                <span style={{ fontWeight: 800, fontSize: 20 }}>Universal DSA Tracker</span>
              </div>
              
              {/* TABS */}
              <div style={{ display: "flex", gap: 5, borderTop: "1px solid #21262d", marginTop: 10 }}>
                {[
                  { label: "Blind 75", sub: "The Core Fundamentals", dataObj: BLIND_75 },
                  { label: "Curated 150", sub: "Product Companies", dataObj: CURATED_150 },
                  { label: "Master 223", sub: "Complete Supremacy", dataObj: MASTER_223 }
                ].map((t, i) => (
                  <button key={i} onClick={() => { setTab(i); setQ(""); setDf("all"); }} style={{
                    flex: 1, background: "none", border: "none", textAlign: "center", padding: "12px 10px",
                    borderTop: tab === i ? "2px solid #58a6ff" : "2px solid transparent",
                    color: tab === i ? "#e6edf3" : "#8b949e", cursor: "pointer"
                  }}>
                    <div style={{ fontWeight: 600 }}>{t.label}</div>
                    <div style={{ fontSize: 11, color: "#6e7681", marginTop: 3 }}>{t.sub}</div>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 860, margin: "0 auto", padding: "20px" }}>
            {/* PROGRESS CARD */}
            <div style={{ background: "#161b22", border: "1px solid #30363d", borderRadius: 12, padding: "20px", marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 15 }}>
                <div>
                  <div style={{ fontSize: 32, fontWeight: 900 }}>{stats.solved} <span style={{ fontSize: 16, color: "#8b949e", fontWeight: 500 }}>/ {stats.total} solved in this list</span></div>
                  <div style={{ display: "flex", gap: 15, marginTop: 8, fontSize: 13 }}>
                    <span style={{ color: "#3fb950" }}>● {stats.es} Easy</span>
                    <span style={{ color: "#d29922" }}>● {stats.ms} Medium</span>
                    <span style={{ color: "#f85149" }}>● {stats.hs} Hard</span>
                  </div>
                </div>
                <div style={{ fontSize: 36, fontWeight: 900, color: "#58a6ff" }}>{pct}%</div>
              </div>
              <div style={{ height: 8, background: "#30363d", borderRadius: 4, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${pct}%`, background: "linear-gradient(90deg, #1a4731, #3fb950)", transition: "width 0.4s" }} />
              </div>
            </div>

            {/* CONTROLS */}
            <div style={{ display: "flex", gap: 10, marginBottom: 15 }}>
              <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search..." 
                style={{ flex: 1, padding: "10px 15px", background: "#161b22", border: "1px solid #30363d", color: "#fff", borderRadius: 6, outline: "none" }} />
              
              {["all", "easy", "medium", "hard"].map(key => (
                <button key={key} onClick={() => setDf(key)} style={{
                  background: df === key ? "#1f6feb" : "#161b22", color: "#fff",
                  border: `1px solid ${df === key ? "#1f6feb" : "#30363d"}`, borderRadius: 6, padding: "0 15px", cursor: "pointer", textTransform: "capitalize"
                }}>{key}</button>
              ))}
            </div>

            {/* PROBLEMS LIST */}
            {Object.entries(fdata).map(([topic, { emoji, items }]) => {
              const isOpen = exp[topic] !== false; // Default open
              const topicTotal = data[topic].items.length;
              const topicSolved = getTopicSolvedCount(topic);
              
              return (
                <div key={topic} style={{ background: "#161b22", border: "1px solid #30363d", borderRadius: 8, marginBottom: 10, overflow: "hidden" }}>
                  <div onClick={() => setExp({ ...exp, [topic]: !isOpen })}
                    style={{ padding: "15px", display: "flex", alignItems: "center", cursor: "pointer", background: isOpen ? "#1c2433" : "#161b22" }}>
                    <span style={{ fontSize: 20, marginRight: 15 }}>{emoji}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600 }}>{topic}</div>
                      <div style={{ fontSize: 12, color: "#8b949e", marginTop: 3 }}>{topicSolved} / {topicTotal}</div>
                    </div>
                  </div>

                  {isOpen && (
                    <div>
                      {items.map(([name, diff], i) => {
                        const isDone = !!done[normalize(name)];
                        const dStyle = DIFF_COLORS[diff];
                        
                        return (
                          <div key={i} onClick={() => toggle(name)}
                            style={{ display: "flex", alignItems: "center", padding: "12px 15px", borderTop: "1px solid #21262d", cursor: "pointer", background: isDone ? "rgba(35,134,54,0.1)" : "transparent" }}>
                            
                            {/* Sync Checkbox */}
                            <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${isDone ? "#3fb950" : "#30363d"}`, background: isDone ? "#3fb950" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", marginRight: 15 }}>
                              {isDone && <span style={{ color: "#fff", fontSize: 12, fontWeight: 900 }}>✓</span>}
                            </div>
                            
                            <span style={{ flex: 1, textDecoration: isDone ? "line-through" : "none", color: isDone ? "#8b949e" : "#e6edf3" }}>{name}</span>
                            
                            <span style={{ background: dStyle.bg, color: dStyle.c, border: `1px solid ${dStyle.br}`, padding: "3px 10px", borderRadius: 100, fontSize: 11, fontWeight: 600 }}>
                              {dStyle.label}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
