    function DSASheet() {
      const [tab, setTab] = useState(0);
      const [done, setDone] = useState(() => {
        const saved = localStorage.getItem('dsa_progress');
        return saved ? JSON.parse(saved) : {};
      });
      const [exp, setExp] = useState({});
      const [q, setQ] = useState("");
      const [df, setDf] = useState("all");
      const [b75only, setB75only] = useState(false);

      const data = tab === 0 ? S1 : S2;
      const mk = (topic, i) => `${tab}:${topic}:${i}`;

      const toggle = (topic, i) => {
        const k = mk(topic, i);
        const newDone = { ...done, [k]: !done[k] };
        setDone(newDone);
        localStorage.setItem('dsa_progress', JSON.stringify(newDone));
      };

      const stats = useMemo(() => {
        let total=0,solved=0,es=0,ms=0,hs=0,b75t=0,b75s=0;
        Object.entries(data).forEach(([topic,{items}]) => {
          items.forEach((item,i) => {
            const d = tab===0?item[2]:item[1];
            const isB = tab===1&&item[2]===true;
            const isDone = !!done[mk(topic,i)];
            total++; if(isDone) solved++;
            if(d==="E"&&isDone) es++;
            if(d==="M"&&isDone) ms++;
            if(d==="H"&&isDone) hs++;
            if(isB){b75t++;if(isDone)b75s++;}
          });
        });
        return {total,solved,es,ms,hs,b75t,b75s};
      }, [data, done, tab]);

      const fdata = useMemo(() => {
        const dm = {easy:"E",medium:"M",hard:"H"};
        const res = {};
        Object.entries(data).forEach(([topic,{emoji,items}]) => {
          const filtered = items.map((item,i)=>({item,i})).filter(({item}) => {
            const name = tab===0?item[1]:item[0];
            const d = tab===0?item[2]:item[1];
            const isB = tab===1&&item[2]===true;
            if(q && !name.toLowerCase().includes(q.toLowerCase())) return false;
            if(df!=="all" && d!==dm[df]) return false;
            if(b75only&&tab===1&&!isB) return false;
            return true;
          });
          if(filtered.length>0) res[topic]={emoji,filtered};
        });
        return res;
      }, [data, q, df, b75only, tab]);

      const pct = stats.total>0?Math.round(stats.solved/stats.total*100):0;
      const tSolved = (topic) => data[topic]?.items.filter((_,i)=>done[mk(topic,i)]).length||0;
      const tTotal  = (topic) => data[topic]?.items.length||0;

      const s1tot = Object.values(S1).reduce((a,t)=>a+t.items.length,0);
      const s2tot = Object.values(S2).reduce((a,t)=>a+t.items.length,0);

      const expandAll = () => { const o={}; Object.keys(data).forEach(k=>o[k]=true); setExp(o); };

      return (
        <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:"#0d1117",minHeight:"100vh",color:"#e6edf3"}}>
          <div style={{background:"#161b22",borderBottom:"1px solid #30363d",padding:"18px 20px 0"}}>
            <div style={{maxWidth:860,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:3}}>
                <span style={{fontSize:22}}>⚡</span>
                <span style={{fontWeight:800,fontSize:19,letterSpacing:"-0.5px"}}>DSA Master Sheet</span>
                <span style={{fontSize:10,background:"#1f3a6e",color:"#79c0ff",padding:"2px 8px",borderRadius:100,fontWeight:700,letterSpacing:0.6,border:"1px solid #1f6feb"}}>PRODUCT COMPANIES · INDIA</span>
              </div>
              <p style={{margin:"0 0 10px",fontSize:12,color:"#8b949e"}}>
                {tab===0
                  ? `${s1tot} hand-picked problems · difficulty separated · same topics as your list`
                  : `Blind 75 mapped to your topics + curated LC additions · ${s2tot} total entries`}
              </p>
              <div style={{display:"flex",gap:0,borderTop:"1px solid #21262d",marginTop:2}}>
                {[
                  {label:"Sheet 1 — 150 Curated",sub:"for product companies",count:s1tot},
                  {label:"Sheet 2 — Blind 75 +",sub:"same topics + additions",count:s2tot}
                ].map(({label,sub,count},i)=>(
                  <button key={i} onClick={()=>{setTab(i);setB75only(false);setQ("");setDf("all");}} style={{
                    background:"none",border:"none",
                    borderTop:tab===i?"2px solid #58a6ff":"2px solid transparent",
                    color:tab===i?"#e6edf3":"#8b949e",
                    padding:"10px 20px",fontSize:13,fontWeight:tab===i?600:400,cursor:"pointer",textAlign:"left"
                  }}>
                    <div style={{fontWeight:600}}>{label} <span style={{fontSize:11,color:"#58a6ff",fontWeight:500}}>({count})</span></div>
                    <div style={{fontSize:10,color:"#6e7681",marginTop:1}}>{sub}</div>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{maxWidth:860,margin:"0 auto",padding:"18px 20px 80px"}}>
            <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:12,padding:"18px 22px",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                <div>
                  <div style={{display:"flex",alignItems:"baseline",gap:5}}>
                    <span style={{fontSize:34,fontWeight:900,letterSpacing:"-2px",color:"#e6edf3"}}>{stats.solved}</span>
                    <span style={{fontSize:15,color:"#6e7681",fontWeight:400}}>/ {stats.total} solved</span>
                  </div>
                  <div style={{display:"flex",gap:14,marginTop:8,fontSize:12}}>
                    <span style={{color:"#3fb950",fontWeight:600}}>● {stats.es} Easy</span>
                    <span style={{color:"#d29922",fontWeight:600}}>● {stats.ms} Medium</span>
                    <span style={{color:"#f85149",fontWeight:600}}>● {stats.hs} Hard</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:30,fontWeight:900,color:"#58a6ff",letterSpacing:"-1px"}}>{pct}%</div>
                  {tab===1&&(
                    <div style={{fontSize:11,color:"#8b949e",marginTop:3,display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}>
                      <span style={{background:"rgba(31,111,235,0.15)",color:"#79c0ff",padding:"1px 7px",borderRadius:100,fontSize:10,fontWeight:700,border:"1px solid rgba(31,111,235,0.3)"}}>B75</span>
                      <span style={{color:"#58a6ff",fontWeight:600}}>{stats.b75s}/{stats.b75t}</span>
                    </div>
                  )}
                </div>
              </div>
              <div style={{background:"#30363d",height:8,borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#1a4731,#238636,#3fb950)",borderRadius:4,transition:"width 0.5s ease"}} />
              </div>
            </div>

            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{flex:"1 1 160px",position:"relative"}}>
                <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13}}>🔍</span>
                <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search problems..."
                  style={{width:"100%",boxSizing:"border-box",background:"#161b22",border:"1px solid #30363d",borderRadius:7,color:"#e6edf3",padding:"8px 12px 8px 30px",fontSize:13,outline:"none"}} />
              </div>
              {[
                {key:"all",  label:"All",   ac:"#1c2d45",cc:"#79c0ff",bc:"#1f6feb"},
                {key:"easy", label:"Easy",  ac:"#0d2818",cc:"#3fb950",bc:"#3fb950"},
                {key:"medium",label:"Medium",ac:"#2d1f05",cc:"#d29922",bc:"#d29922"},
                {key:"hard", label:"Hard",  ac:"#2d0d0d",cc:"#f85149",bc:"#f85149"},
              ].map(({key,label,ac,cc,bc})=>(
                <button key={key} onClick={()=>setDf(key)} style={{
                  background:df===key?ac:"#161b22",border:`1px solid ${df===key?bc:"#30363d"}`,
                  color:df===key?cc:"#8b949e",borderRadius:7,padding:"7px 13px",
                  fontSize:12,cursor:"pointer",fontWeight:df===key?700:400,transition:"all 0.15s"
                }}>{label}</button>
              ))}
              {tab===1&&(
                <button onClick={()=>setB75only(p=>!p)} style={{
                  background:b75only?"#111d2e":"#161b22",border:`1px solid ${b75only?"#58a6ff":"#30363d"}`,
                  color:b75only?"#58a6ff":"#8b949e",borderRadius:7,padding:"7px 13px",
                  fontSize:12,cursor:"pointer",fontWeight:b75only?700:400,transition:"all 0.15s"
                }}>🎯 Blind 75 Only</button>
              )}
              <button onClick={expandAll} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:7,color:"#8b949e",padding:"7px 11px",fontSize:11,cursor:"pointer"}}>↕ Expand All</button>
              <button onClick={()=>setExp({})} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:7,color:"#8b949e",padding:"7px 11px",fontSize:11,cursor:"pointer"}}>↕ Collapse</button>
            </div>

            {tab===1&&(
              <div style={{display:"flex",gap:12,marginBottom:12,fontSize:11,color:"#8b949e",alignItems:"center",padding:"8px 12px",background:"#161b22",borderRadius:7,border:"1px solid #30363d"}}>
                <span>📋 Legend:</span>
                <span style={{background:"rgba(31,111,235,0.15)",color:"#79c0ff",padding:"1px 7px",borderRadius:100,fontSize:10,fontWeight:700,border:"1px solid rgba(31,111,235,0.3)"}}>B75</span>
                <span>= Blind 75 problem</span>
                <span style={{marginLeft:8,color:"#6e7681"}}>#</span><span>= LeetCode number</span>
              </div>
            )}

            {Object.entries(fdata).map(([topic,{emoji,filtered}])=>{
              const isOpen = !!exp[topic];
              const ts = tSolved(topic), tt = tTotal(topic);
              const tp = tt>0?Math.round(ts/tt*100):0;
              const ec=filtered.filter(({item})=>(tab===0?item[2]:item[1])==="E").length;
              const mc=filtered.filter(({item})=>(tab===0?item[2]:item[1])==="M").length;
              const hc=filtered.filter(({item})=>(tab===0?item[2]:item[1])==="H").length;

              return (
                <div key={topic} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,marginBottom:8,overflow:"hidden",transition:"border-color 0.15s"}}>
                  <div onClick={()=>setExp(p=>({...p,[topic]:!p[topic]}))}
                    style={{display:"flex",alignItems:"center",padding:"13px 18px",cursor:"pointer",gap:12,
                      background:isOpen?"#1c2433":"#161b22",transition:"background 0.15s",userSelect:"none"}}>
                    <span style={{fontSize:18,lineHeight:1}}>{emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                        <span style={{fontWeight:700,fontSize:14}}>{topic}</span>
                        <div style={{display:"flex",gap:3}}>
                          {ec>0&&<span style={{fontSize:9,background:"rgba(63,185,80,0.12)",color:"#3fb950",padding:"2px 6px",borderRadius:100,fontWeight:700,border:"1px solid rgba(63,185,80,0.2)"}}>{ec}E</span>}
                          {mc>0&&<span style={{fontSize:9,background:"rgba(210,153,34,0.12)",color:"#d29922",padding:"2px 6px",borderRadius:100,fontWeight:700,border:"1px solid rgba(210,153,34,0.2)"}}>{mc}M</span>}
                          {hc>0&&<span style={{fontSize:9,background:"rgba(248,81,73,0.12)",color:"#f85149",padding:"2px 6px",borderRadius:100,fontWeight:700,border:"1px solid rgba(248,81,73,0.2)"}}>{hc}H</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:90,background:"#30363d",height:3,borderRadius:2,overflow:"hidden",flexShrink:0}}>
                          <div style={{height:"100%",width:`${tp}%`,background:tp===100?"#3fb950":"#1f6feb",borderRadius:2,transition:"width 0.3s"}} />
                        </div>
                        <span style={{fontSize:11,color:"#6e7681"}}>{ts}/{tt}</span>
                        {tp===100&&<span style={{fontSize:10,color:"#3fb950",fontWeight:700}}>✓ Done!</span>}
                      </div>
                    </div>
                    <div style={{color:"#6e7681",fontSize:12,transition:"transform 0.2s",transform:isOpen?"rotate(180deg)":"rotate(0deg)",flexShrink:0}}>▼</div>
                  </div>

                  {isOpen&&(
                    <div style={{borderTop:"1px solid #21262d"}}>
                      {(()=>{
                        const groups = [["E","Easy","#3fb950"],["M","Medium","#d29922"],["H","Hard","#f85149"]];
                        const elements = [];
                        groups.forEach(([dKey,dLabel,dColor]) => {
                          const groupItems = filtered.filter(({item})=>(tab===0?item[2]:item[1])===dKey);
                          if(groupItems.length===0) return;
                          elements.push(
                            <div key={dKey}>
                              <div style={{padding:"6px 18px 4px",background:"#0d1117",borderBottom:"1px solid #21262d",display:"flex",alignItems:"center",gap:6}}>
                                <div style={{width:6,height:6,borderRadius:"50%",background:dColor}} />
                                <span style={{fontSize:11,color:dColor,fontWeight:700,letterSpacing:0.5}}>{dLabel.toUpperCase()}</span>
                              </div>
                              {groupItems.map(({item,i})=>{
                                const name = tab===0?item[1]:item[0];
                                const isB75 = tab===1&&item[2]===true;
                                const lcNum = tab===1?item[3]:null;
                                const isDone = !!done[mk(topic,i)];
                                const d = DIFF[dKey];
                                return (
                                  <div key={i} onClick={()=>toggle(topic,i)}
                                    style={{display:"flex",alignItems:"center",padding:"9px 18px",cursor:"pointer",gap:10,
                                      background:isDone?"rgba(35,134,54,0.06)":"transparent",
                                      borderBottom:"1px solid #21262d",transition:"background 0.1s"}}>
                                    <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${isDone?"#238636":"#30363d"}`,
                                      background:isDone?"#238636":"transparent",display:"flex",alignItems:"center",justifyContent:"center",
                                      flexShrink:0,transition:"all 0.15s"}}>
                                      {isDone&&<span style={{color:"#fff",fontSize:9,fontWeight:900,lineHeight:1}}>✓</span>}
                                    </div>
                                    <span style={{flex:1,fontSize:13,color:isDone?"#6e7681":"#e6edf3",
                                      textDecoration:isDone?"line-through":"none",lineHeight:1.4,minWidth:0}}>
                                      {tab===0&&<span style={{color:"#58a6ff",fontSize:11,marginRight:8,fontFamily:"'Courier New',monospace",fontWeight:600}}>#{item[0]}</span>}
                                      {name}
                                    </span>
                                    <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                                      {isB75&&<span style={{fontSize:9,background:"rgba(31,111,235,0.15)",color:"#79c0ff",padding:"2px 6px",borderRadius:100,fontWeight:700,border:"1px solid rgba(31,111,235,0.35)",letterSpacing:0.4}}>B75</span>}
                                      {lcNum>0&&<span style={{fontSize:10,color:"#6e7681",fontFamily:"'Courier New',monospace"}}>#{lcNum}</span>}
                                      <span style={{fontSize:10,background:d.bg,color:d.c,border:`1px solid ${d.br}`,padding:"2px 8px",borderRadius:100,fontWeight:600,minWidth:46,textAlign:"center"}}>
                                        {d.label}
                                      </span>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        });
                        return elements;
                      })()}
                    </div>
                  )}
                </div>
              );
            })}

            {Object.keys(fdata).length===0&&(
              <div style={{textAlign:"center",padding:"70px 20px",color:"#8b949e"}}>
                <div style={{fontSize:42,marginBottom:12}}>🔍</div>
                <div style={{fontSize:15,fontWeight:600,color:"#e6edf3",marginBottom:6}}>No problems found</div>
                <div style={{fontSize:13}}>Try adjusting your search query or filters.</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DSASheet />);
  </script>
</body>
</html>
